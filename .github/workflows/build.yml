name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: esp32_devkitc/esp32/procpu
            toolchain: xtensa-espressif_esp32_zephyr-elf
          - board: esp32s3_devkitc/esp32s3/procpu
            toolchain: xtensa-espressif_esp32s3_zephyr-elf
    steps:
      - name: Checkout (into the module's manifest path)
        uses: actions/checkout@v4
        with:
          path: modules/lib/network_provisioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Zephyr workspace, SDK and toolchain
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: modules/lib/network_provisioning
          toolchains: ${{ matrix.toolchain }}

      - name: Fetch Espressif binary blobs (Wi-Fi/BLE firmware)
        run: west blobs fetch hal_espressif

      - name: Build wifi_prov_ble sample
        run: |
          west build -b ${{ matrix.board }} \
            modules/lib/network_provisioning/samples/wifi_prov_ble
