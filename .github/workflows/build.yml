name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Unit tests (native_sim)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: network-provisioning-zephyr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Zephyr workspace, SDK and toolchain
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: network-provisioning-zephyr
          # native_sim builds with the host compiler; the SDK provides
          # host tools and keeps the setup uniform with the build job.
          toolchains: x86_64-zephyr-elf

      - name: Install nanopb generator dependencies
        # nanopb's zephyr_nanopb_sources() runs protoc via grpcio-tools.
        # (west packages pip --install refuses to run outside a virtualenv.)
        run: pip install grpcio-tools==1.68.0

      - name: Run unit tests with twister
        run: |
          west twister -T network-provisioning-zephyr/tests \
            -p native_sim --inline-logs -v

  build:
    name: Build ${{ matrix.sample }} (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sample: [wifi_prov_ble, wifi_prov_softap]
        # RISC-V coverage via esp32c3. The original esp32 is excluded: its
        # DRAM overflows without PSRAM (see the sample README).
        board: [esp32s3_devkitc/esp32s3/procpu, esp32c3_devkitm]
        include:
          - board: esp32s3_devkitc/esp32s3/procpu
            toolchain: xtensa-espressif_esp32s3_zephyr-elf
          - board: esp32c3_devkitm
            toolchain: riscv64-zephyr-elf
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: network-provisioning-zephyr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Zephyr workspace, SDK and toolchain
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: network-provisioning-zephyr
          toolchains: ${{ matrix.toolchain }}

      - name: Install nanopb generator dependencies
        # nanopb's zephyr_nanopb_sources() runs protoc via grpcio-tools.
        # (west packages pip --install refuses to run outside a virtualenv.)
        run: pip install grpcio-tools==1.68.0

      - name: Fetch Espressif binary blobs (Wi-Fi/BLE firmware)
        # The blob host occasionally returns transient 5xx errors; retry.
        run: |
          n=0
          until west blobs fetch hal_espressif; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "blob fetch still failing after $n attempts"; exit 1
            fi
            echo "transient blob fetch error; retry $n after backoff"
            sleep $((n * 10))
          done

      - name: Build sample
        run: |
          west build -b ${{ matrix.board }} \
            network-provisioning-zephyr/samples/${{ matrix.sample }}
