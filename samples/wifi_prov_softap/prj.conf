# Wi-Fi provisioning over SoftAP (HTTP) sample
#
# SPDX-License-Identifier: Apache-2.0

# --- Provisioning service ---------------------------------------------------
CONFIG_NETWORK_PROV_MGR=y
CONFIG_NETWORK_PROV_SOFTAP=y

# --- Wi-Fi station + access point (AP/STA concurrent) -----------------------
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_WIFI_USAGE_MODE_STA_AP=y
CONFIG_ESP32_WIFI_AP_STA_MODE=y
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_L2_WIFI_MGMT=y

# DHCP server for clients joining the provisioning AP.
CONFIG_NET_DHCPV4_SERVER=y

# --- HTTP server (protocomm endpoints at http://192.168.4.1) ----------------
CONFIG_HTTP_SERVER=y
# The DHCPv4 server's socket service and the HTTP server each need one
# eventfd; with the default of 1 the HTTP server fails to start (-ENOMEM).
CONFIG_ZVFS_EVENTFD_MAX=2
# Session continuity needs the Cookie request header.
CONFIG_HTTP_SERVER_CAPTURE_HEADERS=y
# More than one client slot: the stock Android app (HttpURLConnection) opens a
# fresh connection for the next status poll while a previous keep-alive one
# still lingers, so several connections are open at once. One slot would block
# the new poll behind the stale socket for the whole inactivity timeout.
CONFIG_HTTP_SERVER_MAX_CLIENTS=3
# The server polls (1 eventfd + 1 listener + MAX_CLIENTS) sockets in a single
# zsock_poll(); the poll budget must cover that. With the default of 3 the poll
# fails with ENOMEM the moment a second client connects, the extra client gets
# an empty response, and the app crashes feeding null to its AES cipher
# ("Null input buffer"). 1 + 1 + 3 = 5, plus margin.
CONFIG_ZVFS_POLL_MAX=8
CONFIG_HTTP_SERVER_CLIENT_BUFFER_SIZE=1024
# The security-1 handshake (X25519 ECDH, AES-CTR, SHA-256) runs in the HTTP
# server thread via the endpoint handlers — same lesson as the BLE RX thread:
# the crypto needs multi-kB stacks.
CONFIG_HTTP_SERVER_STACK_SIZE=8192

# --- Credential storage (native wifi_credentials, settings backend) ---------
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

# --- Crypto: PSA (mbedTLS) for security scheme 1 ----------------------------
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384
CONFIG_ENTROPY_GENERATOR=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ECC_MONTGOMERY_255=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_DERIVE=y
CONFIG_PSA_WANT_ALG_CTR=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_SHA_256=y

# --- Protobuf ---------------------------------------------------------------
CONFIG_NANOPB=y

# --- Runtime resources ------------------------------------------------------
# The esp32 Wi-Fi driver allocates from the kernel heap and reserves 50 kB for
# itself (HEAP_MEM_POOL_ADD_SIZE_ESP_WIFI); AP+STA mode needs real headroom on
# top or RX allocations fail as soon as a station associates.
CONFIG_HEAP_MEM_POOL_SIZE=98304
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# --- Logging ----------------------------------------------------------------
CONFIG_LOG=y
CONFIG_NETWORK_PROV_LOG_LEVEL_INF=y
CONFIG_PRINTK=y
