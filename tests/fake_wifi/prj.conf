# SPDX-License-Identifier: Apache-2.0

CONFIG_ZTEST=y

# The fake Wi-Fi offload backend under test pulls in WIFI + the Wi-Fi L2.
CONFIG_NETWORK_PROV_FAKE_WIFI=y

CONFIG_NETWORKING=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y

# No real L2/transport: the fake interface is offloaded, so the native_sim TAP
# Ethernet driver (which needs host privileges to create zeth) is not wanted.
# A packet family still has to be selected for the net stack to build.
CONFIG_ETH_NATIVE_TAP=n
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n

# The backend logs via the generic log module.
CONFIG_LOG=y

CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096
