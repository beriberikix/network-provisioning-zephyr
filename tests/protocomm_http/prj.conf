# SPDX-License-Identifier: Apache-2.0

CONFIG_ZTEST=y

CONFIG_NETWORK_PROV_CORE=y
CONFIG_NETWORK_PROV_SOFTAP=y
CONFIG_NANOPB=y

# HTTP server over the loopback interface only: no host TAP device (needs
# host privileges) and no IPv6 (the server would bind :: first).
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_LOOPBACK=y
# The suite makes many short-lived connections; release closed ones promptly
# and leave headroom for the ones still in teardown.
CONFIG_NET_MAX_CONN=16
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_NET_TCP_TIME_WAIT_DELAY=0
CONFIG_ETH_NATIVE_TAP=n
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_CAPTURE_HEADERS=y
# Match the sample: real clients (the Android app) open several connections at
# once, so exercise concurrent clients here.
CONFIG_HTTP_SERVER_MAX_CLIENTS=3
CONFIG_HTTP_SERVER_CLIENT_BUFFER_SIZE=1024
CONFIG_HTTP_SERVER_STACK_SIZE=8192
# The server polls (1 eventfd + 1 listener + MAX_CLIENTS) sockets at once; the
# poll budget must cover that (>= 2 + MAX_CLIENTS) or zsock_poll() fails with
# ENOMEM as soon as a second client connects. test_05 exercises concurrent
# connections and fails if this is too small.
CONFIG_ZVFS_POLL_MAX=8
CONFIG_POSIX_API=n

# PSA crypto for security scheme 1: the suite runs the full X25519 + AES-CTR
# handshake and encrypted echo on the client side.
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384
CONFIG_ENTROPY_GENERATOR=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ECC_MONTGOMERY_255=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_DERIVE=y
CONFIG_PSA_WANT_ALG_CTR=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_SHA_256=y

CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_ZTEST_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=8192

# Surface server-side errors while the suite runs.
CONFIG_LOG=y
CONFIG_NET_LOG=y
CONFIG_NET_HTTP_SERVER_LOG_LEVEL_DBG=y
